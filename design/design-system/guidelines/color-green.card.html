<!-- @dsCard group="Colors" viewport="700x170" name="Brand Green" subtitle="The only chromatic note — a highlighter, never a fill" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rt-bg); font-family: var(--rt-mono); }
  .row { display: flex; gap: 14px; padding: 22px; align-items: stretch; }
  .sw { flex: 1; }
  .chip { height: 74px; border-radius: 6px; border: 1px solid var(--rt-rule-2); }
  .name { margin-top: 9px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rt-ink); }
  .hex { font-size: 10px; letter-spacing: 0.08em; color: var(--rt-ink-3); margin-top: 3px; }
  .note { padding: 0 22px 18px; font-family: var(--rt-serif); font-size: 13px; color: var(--rt-ink-2); line-height: 1.6; }
  .note em { font-style: italic; color: var(--rt-green-deep); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#2F6A52"></div><div class="name">green · accent</div><div class="hex">#2F6A52</div></div>
    <div class="sw"><div class="chip" style="background:#1F4D3A"></div><div class="name">green-deep</div><div class="hex">#1F4D3A</div></div>
    <div class="sw"><div class="chip" style="background:rgba(47,106,82,0.10)"></div><div class="name">green-soft</div><div class="hex">10% wash</div></div>
  </div>
  <div class="note">~90% of any screen is paper and ink. Green only lights what must be lit — <em>an emphasised word</em>, a selected chip, the CTA, a progress dot.</div>
</body>
</html>
