<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rt-bg); padding: 26px 30px; }
  .anno { background: var(--rt-green-soft); border-left: 2px solid var(--rt-green); border-radius: 0 6px 6px 0; padding: 15px 18px; max-width: 560px; }
  .head { font-family: var(--rt-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rt-green); font-weight: 700; margin-bottom: 9px; }
  .title { font-family: var(--rt-serif); font-size: 16.5px; font-weight: 700; color: var(--rt-green-deep); margin: 0 0 8px; }
  .text { font-family: var(--rt-serif); font-size: 14px; line-height: 1.7; color: var(--rt-green-deep); margin: 0; }
</style>
</head>
<body>
  <aside class="anno">
    <div class="head">章节导读 · Lead-in</div>
    <h3 class="title">下山入世：孤独的完成</h3>
    <p class="text">这一节讲查拉图斯特拉隐居十年后，突然决定下山——智慧积得太满，必须分出去，否则腻得慌。</p>
  </aside>
