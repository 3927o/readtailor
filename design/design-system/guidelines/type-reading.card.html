<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rt-bg); padding: 26px 30px; }
  .lab { font-family: var(--rt-mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rt-green); margin-bottom: 16px; display:flex; align-items:center; gap:12px; }
  .lab::before { content:""; width:28px; height:1px; background: var(--rt-green); }
  p.body { font-family: var(--rt-read); font-size: 18px; line-height: 1.95; color: var(--rt-ink); text-indent: 2em; text-align: justify; margin: 0 0 8px; }
  .meta { font-family: var(--rt-mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--rt-ink-3); margin-top: 14px; }
</style>
</head>
<body>
  <div class="lab">Reading · 阅读区正文</div>
  <p class="body">查拉图斯特拉三十岁时，离开他的家乡和他家乡的湖，到山里去。他在那里安享他的智慧和孤独，十年不倦。</p>
  <div class="meta">18px · line-height 1.95 · indent 2em · justify</div>
</body>
</html>
