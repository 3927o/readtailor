<!-- @dsCard group="Colors" viewport="700x150" name="Paper & Surfaces" subtitle="Warm paper, never pure white — the canvas under everything" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rt-bg); font-family: var(--rt-mono); }
  .row { display: flex; gap: 14px; padding: 22px; }
  .sw { flex: 1; }
  .chip { height: 74px; border-radius: 6px; border: 1px solid var(--rt-rule); }
  .name { margin-top: 9px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rt-ink); }
  .hex { font-size: 10px; letter-spacing: 0.08em; color: var(--rt-ink-3); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FAFAF6"></div><div class="name">bg · paper</div><div class="hex">#FAFAF6</div></div>
    <div class="sw"><div class="chip" style="background:#F0EFE9"></div><div class="name">bg-2 · sunken</div><div class="hex">#F0EFE9</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">bg-card · white</div><div class="hex">#FFFFFF</div></div>
  </div>
</body>
</html>
