<!-- @dsCard group="Type" viewport="700x200" name="Display Serif · the Letter" subtitle="上元明朝 LanternMingA — narration & headings, emphasis in italic green" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rt-bg); padding: 26px 30px; }
  .lab { font-family: var(--rt-mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rt-green); margin-bottom: 18px; display:flex; align-items:center; gap:12px; }
  .lab::before { content:""; width:28px; height:1px; background: var(--rt-green); }
  .h { font-family: var(--rt-serif); font-size: 38px; font-weight: 600; line-height: 1.36; letter-spacing: -0.01em; color: var(--rt-ink); margin: 0; }
  .h em { font-style: italic; color: var(--rt-green-deep); }
  .meta { font-family: var(--rt-mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--rt-ink-3); margin-top: 16px; }
</style>
</head>
<body>
  <div class="lab">Display · 信的大字</div>
  <p class="h">AI 陪读，帮你<em>真正读完</em>一本书。</p>
  <div class="meta">clamp(28–42px) · weight 600 · line-height 1.36 · tracking −0.01em</div>
</body>
</html>
