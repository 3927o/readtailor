<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rt-bg); font-family: var(--rt-mono); }
  .row { display: flex; gap: 14px; padding: 22px; }
  .sw { flex: 1; }
  .chip { height: 74px; border-radius: 6px; }
  .name { margin-top: 9px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rt-ink); }
  .hex { font-size: 10px; letter-spacing: 0.08em; color: var(--rt-ink-3); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0A0A09"></div><div class="name">ink · strong</div><div class="hex">#0A0A09</div></div>
    <div class="sw"><div class="chip" style="background:#4E4D49"></div><div class="name">ink-2 · body</div><div class="hex">#4E4D49</div></div>
    <div class="sw"><div class="chip" style="background:#8E8C85"></div><div class="name">ink-3 · muted</div><div class="hex">#8E8C85</div></div>
  </div>
</body>
</html>
