<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8-based with a 4 half-step — generous air everywhere" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rt-bg); padding: 24px 30px; font-family: var(--rt-mono); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .blk { width: 26px; background: var(--rt-green-soft); border: 1px solid var(--rt-green); border-radius: 2px; }
  .v { font-size: 9px; letter-spacing: 0.06em; color: var(--rt-ink-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="blk" style="height:4px"></div><div class="v">4</div></div>
    <div class="col"><div class="blk" style="height:8px"></div><div class="v">8</div></div>
    <div class="col"><div class="blk" style="height:12px"></div><div class="v">12</div></div>
    <div class="col"><div class="blk" style="height:16px"></div><div class="v">16</div></div>
    <div class="col"><div class="blk" style="height:22px"></div><div class="v">22</div></div>
    <div class="col"><div class="blk" style="height:32px"></div><div class="v">32</div></div>
    <div class="col"><div class="blk" style="height:48px"></div><div class="v">48</div></div>
    <div class="col"><div class="blk" style="height:64px"></div><div class="v">64</div></div>
    <div class="col"><div class="blk" style="height:96px"></div><div class="v">96</div></div>
  </div>
</body>
</html>
