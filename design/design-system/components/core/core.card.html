<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--rt-bg); padding: 28px 30px; }
  .group { margin-bottom: 24px; }
  .glabel { font-family: var(--rt-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rt-ink-3); margin-bottom: 12px; }
  .rowf { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Chip, Kicker } = window.ReadTailorDesignSystem_39423e;
  function Demo() {
    const [sel, setSel] = React.useState('deep');
    return (
      <React.Fragment>
        <div className="group">
          <div className="glabel">Button</div>
          <div className="rowf">
            <Button variant="primary">你愿意，我们就开始</Button>
            <Button variant="secondary">稍后再说</Button>
            <Button variant="ghost">跳过</Button>
            <Button variant="primary" disabled>已开始</Button>
            <Button variant="primary" size="sm">小</Button>
          </div>
        </div>
        <div className="group">
          <div className="glabel">Chip · 想拿到</div>
          <div className="rowf">
            {[['deep','真正读懂'],['intro','入门，建立画面'],['locate','找某个论点']].map(([v,l]) => (
              <Chip key={v} selected={sel===v} onClick={() => setSel(v)}>{l}</Chip>
            ))}
            <Chip serif>《罪与罚》</Chip>
            <Chip as="span">力度 · 适中偏密</Chip>
          </div>
        </div>
        <div className="group" style={{marginBottom:0}}>
          <div className="glabel">Kicker</div>
          <Kicker>问题 · The Problem</Kicker>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
