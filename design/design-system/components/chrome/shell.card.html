<body>
<div id="root"></div>
<script type="text/babel">
  const { ReaderToolbar, TOCList, BottomNav } = window.ReadTailorDesignSystem_39423e;
  function Demo() {
    const [cur, setCur] = React.useState('c1');
    const [tab, setTab] = React.useState('shelf');
    return (
      <React.Fragment>
        <div className="group">
          <div className="glabel">ReaderToolbar</div>
          <div className="shell">
            <ReaderToolbar fixed={false} title="查拉图斯特拉如是说" onBack={() => {}} actions={[

              { glyph: 'Aa', label: '阅读设置' },
              { glyph: '✦', label: '问 AI' },
            ]} />
          </div>
        </div>
        <div className="group">
          <div className="glabel">TOCList</div>
          <div className="shell" style={{maxWidth: 340}}>
            <TOCList current={cur} onSelect={setCur} chapters={[
              { id: 'pre', title: '查拉图斯特拉的前言', read: true },
              { id: 'c1', title: '三种变形' },
              { id: 'c2', title: '道德的讲座' },
              { id: 'c3', title: '背后世界论者' },
            ]} />
          </div>
        </div>
        <div className="group" style={{marginBottom: 0}}>
          <div className="glabel">BottomNav</div>
          <div className="shell">
            <BottomNav fixed={false} value={tab} onChange={setTab} />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
