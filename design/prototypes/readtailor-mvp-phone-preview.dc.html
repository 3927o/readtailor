<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../design-system/tokens/fonts.css">
  <link rel="stylesheet" href="../design-system/tokens/colors.css">
  <link rel="stylesheet" href="../design-system/tokens/typography.css">
  <link rel="stylesheet" href="../design-system/tokens/spacing.css">
  <link rel="stylesheet" href="../design-system/tokens/motion.css">
  <link rel="stylesheet" href="../design-system/tokens/themes.css">
  <link rel="stylesheet" href="../design-system/styles.css">
  <script src="../design-system/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #EDEBE4; }
    .rt-phone-scr::-webkit-scrollbar { width: 0; height: 0; }
    .rt-phone-scr { scrollbar-width: none; }
    /* inside the phone, drop the header sub-mark to keep the top bar roomy */
    .rt-submark { display: none; }
    /* scene-enter rtRise animates transform, which would hijack fixed positioning inside
       the phone shell — replace with an opacity-only fade so fixed UI pins to the screen */
    @keyframes rtPhoneFade { from { opacity: 0; } to { opacity: 1; } }
    .rt-screen { animation-name: rtPhoneFade !important; }
    /* App 内屏幕用 min-height:100vh，在壳内 100vh 是浏览器视口——改用容器高度 */
    .rt-phone-wrap { container-type: size; }
    .rt-phone-wrap .rt-screen, .rt-phone-wrap [data-rt-root] { min-height: 100cqh !important; }
  </style>
</helmet>

<div style="min-height: 100vh; background: #EDEBE4; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 60px; box-sizing: border-box">

  <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px">
    <span style="font-family: var(--rt-serif); font-size: 20px; font-weight: 600; letter-spacing: 0.22em">裁读</span>
    <span style="font-family: var(--rt-mono); font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--rt-ink-3)">READTAILOR · MOBILE PREVIEW</span>
  </div>
  <div style="font-family: var(--rt-serif); font-size: 13px; color: var(--rt-ink-3); margin-bottom: 30px; letter-spacing: 0.04em">与网页端同一套代码，装进手机壳里 · 顶栏“流程 ▾”可跳到任意阶段</div>

  <!-- 手机壳 -->
  <div style="flex: none; width: 402px; height: 830px; background: #1A1916; border-radius: 52px; padding: 13px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.12), 0 40px 80px -36px rgba(20,30,25,0.55), inset 0 0 0 1.5px rgba(255,255,255,0.07)">
    <!-- 侧键 -->
    <div aria-hidden="true" style="position: absolute; left: -2px; top: 150px; width: 3px; height: 58px; background: #121110; border-radius: 3px"></div>
    <div aria-hidden="true" style="position: absolute; left: -2px; top: 228px; width: 3px; height: 58px; background: #121110; border-radius: 3px"></div>
    <div aria-hidden="true" style="position: absolute; right: -2px; top: 190px; width: 3px; height: 86px; background: #121110; border-radius: 3px"></div>

    <!-- 屏幕 -->
    <div style="width: 100%; height: 100%; border-radius: 40px; overflow: hidden; position: relative; background: var(--rt-bg)">
      <!-- 状态栏（含灵动岛），固定在屏幕顶部，不随内容滚动 -->
      <div aria-hidden="true" style="position: absolute; top: 0; left: 0; right: 0; height: 46px; background: var(--rt-bg); z-index: 210; display: flex; align-items: center; justify-content: center">
        <div style="width: 104px; height: 30px; background: #0C0B0A; border-radius: 999px"></div>
      </div>

      <!-- 包含块（transform）在不滚动的外层，让 App 内 fixed 元素锁定在可视屏幕上；内层才是滚动区 -->
      <div class="rt-phone-wrap" style="position: absolute; top: 46px; left: 0; right: 0; bottom: 0; transform: translateZ(0); overflow: hidden; background: var(--rt-bg)">
        <div class="rt-phone-scr" style="width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch">
          <dc-import name="readtailor-mvp" hint-size="100%,100%" style="display: block; min-height: 100%"></dc-import>
        </div>
      </div>

      <!-- Home 指示条 -->
      <div aria-hidden="true" style="position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 128px; height: 5px; background: var(--rt-ink); border-radius: 999px; opacity: 0.3; z-index: 220; pointer-events: none"></div>
    </div>
  </div>

</div>
</x-dc>
</body>
</html>
