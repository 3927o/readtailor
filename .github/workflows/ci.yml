name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: readtailor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d readtailor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test:db
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/readtailor_test
